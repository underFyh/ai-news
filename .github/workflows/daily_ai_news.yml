name: 每日AI推送

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  push-news:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4

      - name: 🐍 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 安装必要的第三方库
        run: |
          python -m pip install --upgrade pip
          # 👇 修改点 1：在这里加上了 feedparser
          pip install requests feedparser

      - name: 🚀 运行新闻抓取与推送脚本
        env:
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UID: ${{ secrets.WXPUSHER_UID }}
          # 👇 修改点 2：将 GitHub Secrets 中的智谱 Key 传给环境变量
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        # 如果你把刚才的 Python 代码保存为了新文件（例如 news_ai_pro.py），请把下面的 news.py 换成新名字
        run: python news.py
